schema_version: v1
name: google-seo-audit
version: 1.1.0

interface:
  display_name: "Google SEO Audit"
  short_description: "Audit any website for Google SEO issues with evidence-backed reports."
  default_prompt: "Use google-seo-audit to audit https://example.com."
  icon_url: "https://raw.githubusercontent.com/jiguang9/google-seo-audit/main/assets/icon.png"

policy:
  allow_implicit_invocation: true

triggers:
  - "audit {url}"
  - "seo audit {url}"
  - "google seo audit {url}"
  - "check seo for {url}"
  - "diagnose {url}"
  - "my traffic dropped for {url}"
  - "lost rankings for {url}"
  - "google update hit {url}"
  - "crawl errors on {url}"
  - "indexing issues with {url}"
  - "core web vitals problem on {url}"
  - "why is {url} not indexed"
  - "用 google-seo-audit 诊断 {url}"
  - "对 {url} 进行 SEO 诊断"
  - "{url} 流量下跌"
  - "{url} 排名下降"
  - "{url} 收录异常"

parameters:
  - name: url
    type: string
    required: true
    description: Target website URL
  - name: psi_key
    type: string
    required: false
    description: >
      Google PageSpeed Insights API key (optional; increases quota).
      Can also be set via PAGESPEED_API_KEY environment variable.
  - name: gsc_file
    type: string
    required: false
    description: Path to Google Search Console CSV export (optional, auto-detects type)
  - name: github_owner
    type: string
    required: false
    description: GitHub username for version check (e.g. jiguang9)

skill_file: ../SKILL.md
source: https://github.com/jiguang9/google-seo-audit
